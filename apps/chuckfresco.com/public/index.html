          var reason = event && event.reason;
          var message = event && (event.message || (reason && reason.message) || String(reason || ""));

          var stack = reason && reason.stack ? reason.stack : "";

            source.indexOf("chrome-extension://") !== -1

          if (!isMetaMaskExtensionError(event)) return;
          event.preventDefault();
          if (typeof event.stopImmediatePropagation === "function") {
            event.stopImmediatePropagation();
          }
        }

        window.addEventListener("error", stopMetaMaskExtensionError, true);
        window.addEventListener("unhandledrejection", stopMetaMaskExtensionError, true);
